<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Abhijit B. Nawale — Portfolio Access</title>
<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Orbitron:wght@400;700;900&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --green: #00ff9d;
    --green-dim: #00c97a;
    --green-glow: rgba(0,255,157,0.18);
    --green-dark: #004d2e;
    --bg: #060d0a;
    --bg2: #0a1510;
    --border: rgba(0,255,157,0.25);
    --border-bright: rgba(0,255,157,0.6);
    --text-dim: rgba(0,255,157,0.55);
  }

  html, body {
    height: 100%;
    background: var(--bg);
    font-family: 'Share Tech Mono', monospace;
    color: var(--green);
    overflow: hidden;
  }

  canvas#grid {
    position: fixed;
    inset: 0;
    z-index: 0;
    opacity: 0.18;
  }

  .scene {
    position: relative;
    z-index: 1;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 2rem 1rem;
  }

  .card {
    width: min(420px, 100%);
    background: rgba(6,13,10,0.92);
    border: 1px solid var(--border-bright);
    border-radius: 4px;
    padding: 2.5rem 2rem;
    position: relative;
    box-shadow:
      0 0 0 1px rgba(0,255,157,0.08),
      0 0 40px rgba(0,255,157,0.08),
      inset 0 0 60px rgba(0,255,157,0.03);
    animation: fadeIn 0.8s ease both;
  }

  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(16px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .corner {
    position: absolute;
    width: 12px; height: 12px;
    border-color: var(--green);
    border-style: solid;
  }
  .corner.tl { top: -1px; left: -1px; border-width: 2px 0 0 2px; }
  .corner.tr { top: -1px; right: -1px; border-width: 2px 2px 0 0; }
  .corner.bl { bottom: -1px; left: -1px; border-width: 0 0 2px 2px; }
  .corner.br { bottom: -1px; right: -1px; border-width: 0 2px 2px 0; }

  .badge {
    text-align: center;
    margin-bottom: 1.8rem;
  }

  .badge-pill {
    display: inline-block;
    font-size: 10px;
    letter-spacing: 0.2em;
    color: var(--green-dim);
    border: 1px solid var(--border);
    border-radius: 999px;
    padding: 3px 14px;
    margin-bottom: 1rem;
  }

  .name {
    font-family: 'Orbitron', monospace;
    font-size: clamp(18px, 5vw, 24px);
    font-weight: 900;
    letter-spacing: 0.1em;
    color: var(--green);
    line-height: 1.2;
  }

  .subtitle {
    font-size: 11px;
    letter-spacing: 0.25em;
    color: var(--text-dim);
    margin-top: 6px;
  }

  .divider {
    border: none;
    border-top: 1px solid var(--border);
    margin: 1.5rem 0;
  }

  .prompt-line {
    font-size: 11px;
    letter-spacing: 0.15em;
    color: var(--text-dim);
    margin-bottom: 0.6rem;
  }

  .prompt-line::before {
    content: '> ';
    color: var(--green-dim);
  }

  .input-wrap {
    display: flex;
    align-items: center;
    border: 1px solid var(--border);
    border-radius: 2px;
    background: rgba(0,255,157,0.04);
    transition: border-color 0.2s;
    margin-bottom: 1.2rem;
  }

  .input-wrap:focus-within {
    border-color: var(--green-dim);
    box-shadow: 0 0 12px rgba(0,255,157,0.1);
  }

  .input-icon {
    padding: 0 12px;
    color: var(--text-dim);
    font-size: 13px;
    user-select: none;
  }

  input[type="password"], input[type="text"] {
    flex: 1;
    background: transparent;
    border: none;
    outline: none;
    color: var(--green);
    font-family: 'Share Tech Mono', monospace;
    font-size: 15px;
    letter-spacing: 0.1em;
    padding: 12px 0;
  }

  input::placeholder { color: rgba(0,255,157,0.25); }

  .toggle-btn {
    background: none;
    border: none;
    color: var(--text-dim);
    cursor: pointer;
    padding: 0 12px;
    font-size: 13px;
    font-family: 'Share Tech Mono', monospace;
    transition: color 0.2s;
    letter-spacing: 0.05em;
  }
  .toggle-btn:hover { color: var(--green); }

  .btn-access {
    width: 100%;
    padding: 13px;
    background: transparent;
    border: 1px solid var(--green-dim);
    color: var(--green);
    font-family: 'Orbitron', monospace;
    font-size: 12px;
    font-weight: 700;
    letter-spacing: 0.25em;
    cursor: pointer;
    border-radius: 2px;
    transition: all 0.2s;
    position: relative;
    overflow: hidden;
  }

  .btn-access::before {
    content: '';
    position: absolute;
    inset: 0;
    background: rgba(0,255,157,0.06);
    transform: scaleX(0);
    transform-origin: left;
    transition: transform 0.3s ease;
  }

  .btn-access:hover::before { transform: scaleX(1); }
  .btn-access:hover { border-color: var(--green); box-shadow: 0 0 20px rgba(0,255,157,0.12); }
  .btn-access:active { transform: scale(0.98); }

  .status {
    margin-top: 1rem;
    font-size: 11px;
    letter-spacing: 0.12em;
    min-height: 18px;
    text-align: center;
    transition: all 0.3s;
  }
  .status.error { color: #ff4e4e; animation: shake 0.4s ease; }
  .status.success { color: var(--green); }

  @keyframes shake {
    0%, 100% { transform: translateX(0); }
    20%, 60% { transform: translateX(-6px); }
    40%, 80% { transform: translateX(6px); }
  }

  .footer-links {
    display: flex;
    justify-content: center;
    gap: 1.5rem;
    margin-top: 1.5rem;
    font-size: 10px;
    letter-spacing: 0.15em;
    color: var(--text-dim);
  }

  .footer-links a {
    color: inherit;
    text-decoration: none;
    transition: color 0.2s;
  }
  .footer-links a:hover { color: var(--green); }

  .scanline {
    position: fixed;
    inset: 0;
    z-index: 2;
    pointer-events: none;
    background: repeating-linear-gradient(
      0deg,
      transparent,
      transparent 2px,
      rgba(0,0,0,0.04) 2px,
      rgba(0,0,0,0.04) 4px
    );
  }

  .unlock-overlay {
    position: fixed;
    inset: 0;
    z-index: 99;
    background: var(--bg);
    display: flex;
    align-items: center;
    justify-content: center;
    flex-direction: column;
    gap: 1rem;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.4s;
  }

  .unlock-overlay.show {
    opacity: 1;
    pointer-events: all;
  }

  .unlock-text {
    font-family: 'Orbitron', monospace;
    font-size: clamp(14px, 4vw, 20px);
    letter-spacing: 0.3em;
    animation: blink 0.7s step-end infinite;
  }

  @keyframes blink {
    0%, 100% { opacity: 1; }
    50% { opacity: 0; }
  }

  .progress-bar {
    width: 200px;
    height: 2px;
    background: var(--border);
    border-radius: 999px;
    overflow: hidden;
  }

  .progress-fill {
    height: 100%;
    background: var(--green);
    width: 0%;
    transition: width 1.2s ease;
    border-radius: 999px;
  }
</style>
</head>
<body>

<canvas id="grid"></canvas>
<div class="scanline"></div>

<div class="unlock-overlay" id="unlockOverlay">
  <div class="unlock-text">ACCESS GRANTED</div>
  <div class="progress-bar"><div class="progress-fill" id="progressFill"></div></div>
</div>

<div class="scene">
  <div class="card">
    <div class="corner tl"></div>
    <div class="corner tr"></div>
    <div class="corner bl"></div>
    <div class="corner br"></div>

    <div class="badge">
      <div class="badge-pill">● LIVE PORTFOLIO</div>
      <div class="name">ABHIJIT B. NAWALE</div>
      <div class="subtitle">DATA ANALYST &nbsp;·&nbsp; MAHARASHTRA IN</div>
    </div>

    <hr class="divider">

    <div class="prompt-line">ENTER ACCESS CODE TO PROCEED</div>

    <div class="input-wrap">
      <span class="input-icon">█</span>
      <input type="password" id="passInput" placeholder="••••••••••" autocomplete="off" spellcheck="false">
      <button class="toggle-btn" id="toggleBtn" onclick="toggleVis()">SHOW</button>
    </div>

    <button class="btn-access" onclick="checkPass()">AUTHENTICATE &amp; ENTER</button>

    <div class="status" id="status"></div>

    <div class="footer-links">
      <a href="https://capable-dusk-5537d0.netlify.app" target="_blank">PORTFOLIO</a>
      <span>·</span>
      <span>ABHIJIT B. NAWALE</span>
      <span>·</span>
      <span>MAHARASHTRA IN</span>
    </div>
  </div>
</div>

<script>
const PASS = 'Abhi@2805';
const URL  = 'https://capable-dusk-5537d0.netlify.app';

const inp    = document.getElementById('passInput');
const status = document.getElementById('status');
const overlay = document.getElementById('unlockOverlay');
const fill   = document.getElementById('progressFill');

inp.addEventListener('keydown', e => { if (e.key === 'Enter') checkPass(); });

function toggleVis() {
  const btn = document.getElementById('toggleBtn');
  if (inp.type === 'password') { inp.type = 'text'; btn.textContent = 'HIDE'; }
  else { inp.type = 'password'; btn.textContent = 'SHOW'; }
}

function checkPass() {
  const val = inp.value;
  if (!val) {
    setStatus('error', '[ ERROR ] INPUT REQUIRED');
    return;
  }
  if (val === PASS) {
    setStatus('success', '[ OK ] CREDENTIALS VERIFIED — LOADING...');
    overlay.classList.add('show');
    setTimeout(() => { fill.style.width = '100%'; }, 80);
    setTimeout(() => { window.location.href = URL; }, 1500);
  } else {
    setStatus('error', '[ DENIED ] INVALID ACCESS CODE');
    inp.value = '';
    inp.focus();
  }
}

function setStatus(type, msg) {
  status.className = 'status ' + type;
  status.textContent = msg;
}

(function drawGrid() {
  const canvas = document.getElementById('grid');
  const ctx = canvas.getContext('2d');
  function resize() {
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
  }
  resize();
  window.addEventListener('resize', resize);

  const cells = [];
  const COLS = Math.ceil(window.innerWidth / 28);
  const ROWS = Math.ceil(window.innerHeight / 28);
  const CHARS = '01ABCDEFabcdef#$%@!?><';

  for (let r = 0; r < ROWS; r++)
    for (let c = 0; c < COLS; c++)
      cells.push({ x: c * 28 + 4, y: r * 28 + 20, ch: CHARS[Math.random() * CHARS.length | 0], t: Math.random() * 3 });

  function draw(ts) {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    ctx.font = '13px "Share Tech Mono", monospace';
    ctx.fillStyle = '#00ff9d';
    cells.forEach(cell => {
      if (ts / 1000 > cell.t) {
        ctx.globalAlpha = Math.random() * 0.6 + 0.1;
        ctx.fillText(cell.ch, cell.x, cell.y);
        if (Math.random() < 0.003) {
          cell.ch = CHARS[Math.random() * CHARS.length | 0];
          cell.t = ts / 1000 + Math.random() * 5;
        }
      }
    });
    ctx.globalAlpha = 1;
    requestAnimationFrame(draw);
  }
  requestAnimationFrame(draw);
})();
</script>
</body>
</html>
